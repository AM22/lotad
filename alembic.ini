# Alembic configuration
# The sqlalchemy.url is intentionally left blank here — it is set in
# alembic/env.py by reading from the LOTAD_DATABASE_URL environment variable
# (or .env file).  Do NOT commit a real DSN to this file.

[alembic]
script_location = alembic
prepend_sys_path = .

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
